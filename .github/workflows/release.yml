name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Set version
        run: echo "export const version = '${{ github.ref_name }}';" > src/var/version.ts

      - run: npm run build

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/simple-weather-card.js
